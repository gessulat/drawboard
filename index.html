<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <title>Drawboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #faf5ec;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
    }
    body.text-mode canvas { cursor: none; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px 8px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 1px 12px rgba(0, 0, 0, 0.06);
      z-index: 10;
      user-select: none;
    }

    .sep {
      width: 18px;
      height: 1px;
      background: rgba(0, 0, 0, 0.08);
    }

    /* ── Color swatches ── */
    .color-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
      padding: 0;
      outline: none;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.active {
      border-color: #fff;
      box-shadow: 0 0 0 1.5px #3a3a3a;
    }

    /* ── Vertical thickness slider ── */
    .thickness-slider {
      writing-mode: vertical-lr;
      direction: rtl;
      appearance: none;
      -webkit-appearance: none;
      height: 80px;
      width: 6px;
      background: transparent;
      cursor: pointer;
      margin: 4px 0;
    }
    .thickness-slider::-webkit-slider-runnable-track {
      width: 4px; height: 100%;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 2px;
    }
    .thickness-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: #888;
      border-radius: 50%;
      border: none;
      margin-left: -5px;
    }
    .thickness-slider::-moz-range-track {
      width: 4px; height: 100%;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 2px;
      border: none;
    }
    .thickness-slider::-moz-range-thumb {
      width: 14px; height: 14px;
      background: #888;
      border-radius: 50%;
      border: none;
    }

    /* ── Action buttons ── */
    .action-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
      color: #777;
      padding: 0;
    }
    .action-btn:hover { background: rgba(0, 0, 0, 0.05); color: #444; }
    .action-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
    .action-btn svg { width: 15px; height: 15px; }

    /* ── Mode toggle ── */
    body.text-mode .icon-draw { display: none; }
    body:not(.text-mode) .icon-text { display: none; }

    /* ── Draw / Text controls visibility ── */
    .draw-controls { display: flex; flex-direction: column; align-items: center; }
    .text-controls { display: none; flex-direction: column; align-items: center; gap: 4px; }
    body.text-mode .draw-controls { display: none; }
    body.text-mode .text-controls { display: flex; }

    /* ── Size buttons ── */
    .size-btn {
      width: 26px;
      height: 18px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      color: #aaa;
      font-family: inherit;
      padding: 0;
      transition: background 0.12s, color 0.12s;
    }
    .size-btn:hover { background: rgba(0, 0, 0, 0.04); }
    .size-btn.active { background: rgba(0, 0, 0, 0.07); color: #444; }

    /* ── Font buttons ── */
    .font-btn {
      width: 26px;
      height: 20px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: #aaa;
      padding: 0;
      transition: background 0.12s, color 0.12s;
    }
    .font-btn:hover { background: rgba(0, 0, 0, 0.04); }
    .font-btn.active { background: rgba(0, 0, 0, 0.07); color: #444; }

    /* ── Home screen ── */
    #home {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #faf5ec;
      padding: 24px;
    }
    #home.hidden { display: none; }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 16px;
      width: 100%;
      height: 100%;
    }

    .home-cell {
      border-radius: 10px;
      overflow: visible;
      cursor: pointer;
      background: #fff;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.07);
      transition: transform 0.15s, box-shadow 0.15s;
      min-height: 0;
    }
    .home-cell:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.11);
    }

    .home-cell.new-cell {
      border: 2px dashed rgba(0, 0, 0, 0.15);
      background: transparent;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-cell.new-cell:hover {
      border-color: rgba(0, 0, 0, 0.3);
      background: rgba(0, 0, 0, 0.02);
    }
    .home-cell.new-cell svg { width: 32px; height: 32px; color: rgba(0, 0, 0, 0.2); }
    .home-cell.new-cell:hover svg { color: rgba(0, 0, 0, 0.4); }

    .home-cell { position: relative; }
    .home-cell img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 10px; }
    .home-cell .delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 13px;
      line-height: 22px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
      padding: 0;
    }
    .home-cell:hover .delete-btn { opacity: 1; }
    .home-cell .delete-btn:hover { background: rgba(0, 0, 0, 0.7); }

    .home-title {
      position: absolute;
      top: 8px;
      left: 10px;
      color: #3a3a3a;
      font-family: Palatino, "Palatino Linotype", "Book Antiqua", serif;
      font-size: 12px;
      font-weight: normal;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 20px);
    }

    /* ── Title input (board view) ── */
    #title-input {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: none;
      outline: none;
      font-family: Palatino, "Palatino Linotype", "Book Antiqua", serif;
      font-size: 30px;
      color: #aaa;
      text-align: center;
      z-index: 10;
      padding: 6px 16px;
      width: auto;
      min-width: 2ch;
      max-width: 80vw;
      white-space: nowrap;
      overflow: visible;
    }
    #title-input:focus { color: #555; }
    #title-input::placeholder { color: #ccc; }
    #title-input.hidden { display: none; }

    /* ── Home button (board view) ── */
    #home-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      box-shadow: 0 1px 12px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      transition: background 0.12s, color 0.12s;
      z-index: 10;
      padding: 0;
    }
    #home-btn:hover { background: rgba(255, 255, 255, 0.9); color: #444; }
    #home-btn.hidden { display: none; }
    #home-btn svg { width: 16px; height: 16px; }

    #help-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 12px rgba(0, 0, 0, 0.06);
      font: 14px/28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #777;
      cursor: pointer;
      z-index: 10;
      padding: 0;
    }
    #help-btn:hover { background: rgba(255, 255, 255, 0.9); color: #444; }

    /* ── Help overlay ── */
    #help-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30, 30, 30, 0.75);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    #help-overlay.visible { display: flex; }
    #help-overlay table {
      color: #eee;
      font-size: 16px;
      border-spacing: 16px 10px;
    }
    #help-overlay kbd {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: inherit;
      font-size: 14px;
      min-width: 28px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="home">
  <div class="home-grid" id="home-grid"></div>
</div>

<button id="home-btn" class="hidden" title="Home">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
</button>

<input id="title-input" class="hidden" type="text" placeholder="Untitled" spellcheck="false" autocomplete="off">

<button id="help-btn" title="Keyboard shortcuts (?)">?</button>

<canvas id="c"></canvas>

<div id="help-overlay">
  <table>
    <tr><td><kbd>i</kbd></td><td>Enter text mode</td></tr>
    <tr><td><kbd>Esc</kbd></td><td>Return to paint mode</td></tr>
    <tr><td><kbd>Tab</kbd> / <kbd>Shift+Tab</kbd></td><td>Cycle colors</td></tr>
    <tr><td><kbd>⌘Z</kbd></td><td>Undo</td></tr>
    <tr><td><kbd>Shift</kbd></td><td>Straight lines</td></tr>
    <tr><td><kbd>?</kbd></td><td>Show this help</td></tr>
  </table>
</div>

<div class="sidebar">
  <!-- Mode toggle -->
  <button class="action-btn" id="mode-toggle" title="Draw mode (i for text)">
    <svg class="icon-draw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
    </svg>
    <svg class="icon-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
    </svg>
  </button>

  <div class="sep"></div>

  <!-- Colors -->
  <button class="color-btn active" data-color="#3a3a3a" style="background:#3a3a3a" title="Black"></button>
  <button class="color-btn" data-color="#b06060" style="background:#b06060" title="Red"></button>
  <button class="color-btn" data-color="#607aab" style="background:#607aab" title="Blue"></button>
  <button class="color-btn" data-color="#5f9a68" style="background:#5f9a68" title="Green"></button>

  <div class="sep"></div>

  <!-- Draw mode: thickness -->
  <div class="draw-controls">
    <input type="range" class="thickness-slider" min="1" max="19" value="3" title="Thickness">
  </div>

  <!-- Text mode: size + font -->
  <div class="text-controls">
    <button class="size-btn" data-size="14">14</button>
    <button class="size-btn active" data-size="18">18</button>
    <button class="size-btn" data-size="24">24</button>
    <button class="size-btn" data-size="32">32</button>
    <div class="sep"></div>
    <button class="font-btn active" data-font="serif" style="font-family:serif" title="Serif">Aa</button>
    <button class="font-btn" data-font="sans-serif" style="font-family:sans-serif" title="Sans-serif">Aa</button>
    <button class="font-btn" data-font="monospace" style="font-family:monospace" title="Monospace">Aa</button>
  </div>

  <div class="sep"></div>

  <!-- Actions -->
  <button class="action-btn" id="undo" title="Undo" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
    </svg>
  </button>
  <button class="action-btn" id="clear" title="Clear">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    </svg>
  </button>
  <button class="action-btn" id="save" title="Save SVG">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ── State ──
  let strokes = [];
  let current = null;
  let activeText = null;
  let mode = 'draw';
  let color = '#3a3a3a';
  let brushWidth = 3;
  let fontSize = 18;
  let fontFamily = 'serif';
  let drawing = false;
  let activePointer = null;
  let mouseX = 0, mouseY = 0;
  let mouseOnCanvas = false;
  let cursorBlink = false;
  let blinkInterval = null;
  let shiftHeld = false;
  let drawingTitle = '';

  // ── URL serialization ──

  const COLORS = ['#3a3a3a', '#b06060', '#607aab', '#5f9a68'];
  const COLOR_IDX = Object.fromEntries(COLORS.map((c, i) => [c, i]));
  const FONT_ENC = { 'serif': 0, 'sans-serif': 1, 'monospace': 2 };
  const FONT_DEC = ['serif', 'sans-serif', 'monospace'];
  let urlGen = 0;

  function zigzag(n) { return (n << 1) ^ (n >> 31); }
  function unzigzag(n) { return (n >>> 1) ^ -(n & 1); }
  function wVar(buf, v) { v >>>= 0; while (v > 0x7f) { buf.push((v & 0x7f) | 0x80); v >>>= 7; } buf.push(v); }
  function rVar(buf, p) { let v = 0, s = 0; while (buf[p.i] & 0x80) { v |= (buf[p.i++] & 0x7f) << s; s += 7; } v |= buf[p.i++] << s; return v >>> 0; }

  function simplify(pts, tol) {
    if (pts.length <= 2) return pts;
    const t2 = tol * tol, keep = new Uint8Array(pts.length);
    keep[0] = keep[pts.length - 1] = 1;
    const stk = [[0, pts.length - 1]];
    while (stk.length) {
      const [a, b] = stk.pop();
      let md = 0, mi = a;
      const ax = pts[a].x, ay = pts[a].y, dx = pts[b].x - ax, dy = pts[b].y - ay, l2 = dx * dx + dy * dy;
      for (let i = a + 1; i < b; i++) {
        let d;
        if (l2 === 0) { d = (pts[i].x - ax) ** 2 + (pts[i].y - ay) ** 2; }
        else { const t = ((pts[i].x - ax) * dx + (pts[i].y - ay) * dy) / l2, ct = t < 0 ? 0 : t > 1 ? 1 : t; d = (pts[i].x - ax - ct * dx) ** 2 + (pts[i].y - ay - ct * dy) ** 2; }
        if (d > md) { md = d; mi = i; }
      }
      if (md > t2) { keep[mi] = 1; if (mi - a > 1) stk.push([a, mi]); if (b - mi > 1) stk.push([mi, b]); }
    }
    return pts.filter((_, i) => keep[i]);
  }

  function encodeStrokes(arr) {
    const buf = [1];
    for (const s of arr) {
      const ci = COLOR_IDX[s.color] ?? 0xf;
      buf.push(((s.type === 'text' ? 1 : 0) << 4) | ci);
      if (ci === 0xf) { const h = s.color.replace('#', ''); buf.push(parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)); }
      if (s.type === 'stroke') {
        buf.push(s.width);
        const pts = simplify(s.points.map(p => ({ x: Math.round(p.x), y: Math.round(p.y) })), 1);
        wVar(buf, pts.length);
        wVar(buf, zigzag(pts[0].x)); wVar(buf, zigzag(pts[0].y));
        for (let i = 1; i < pts.length; i++) { wVar(buf, zigzag(pts[i].x - pts[i - 1].x)); wVar(buf, zigzag(pts[i].y - pts[i - 1].y)); }
      } else {
        buf.push(s.fontSize, FONT_ENC[s.fontFamily] ?? 0);
        wVar(buf, zigzag(Math.round(s.x))); wVar(buf, zigzag(Math.round(s.y)));
        const tb = new TextEncoder().encode(s.text);
        wVar(buf, tb.length); for (const b of tb) buf.push(b);
      }
    }
    return new Uint8Array(buf);
  }

  function decodeStrokes(bytes) {
    const p = { i: 0 }, arr = [];
    if (bytes[p.i++] !== 1) throw new Error('bad version');
    while (p.i < bytes.length) {
      const hdr = bytes[p.i++], type = hdr >> 4, ci = hdr & 0xf;
      const color = ci === 0xf ? '#' + [bytes[p.i++], bytes[p.i++], bytes[p.i++]].map(b => b.toString(16).padStart(2, '0')).join('') : COLORS[ci];
      if (type === 0) {
        const width = bytes[p.i++], count = rVar(bytes, p);
        const pts = [{ x: unzigzag(rVar(bytes, p)), y: unzigzag(rVar(bytes, p)) }];
        for (let j = 1; j < count; j++) { const prev = pts[j - 1]; pts.push({ x: prev.x + unzigzag(rVar(bytes, p)), y: prev.y + unzigzag(rVar(bytes, p)) }); }
        arr.push({ type: 'stroke', color, width, points: pts });
      } else {
        const fontSize = bytes[p.i++], fontFamily = FONT_DEC[bytes[p.i++]] || 'serif';
        const x = unzigzag(rVar(bytes, p)), y = unzigzag(rVar(bytes, p));
        const tl = rVar(bytes, p), text = new TextDecoder().decode(bytes.slice(p.i, p.i + tl)); p.i += tl;
        arr.push({ type: 'text', color, fontSize, fontFamily, x, y, text });
      }
    }
    return arr;
  }

  function toBase64url(bytes) {
    let b = '';
    for (const v of bytes) b += String.fromCharCode(v);
    return btoa(b).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  function fromBase64url(s) {
    const b = atob(s.replace(/-/g, '+').replace(/_/g, '/'));
    const a = new Uint8Array(b.length);
    for (let i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
    return a;
  }

  async function deflate(bytes) {
    const cs = new CompressionStream('deflate-raw');
    const w = cs.writable.getWriter();
    w.write(bytes);
    w.close();
    const chunks = [], r = cs.readable.getReader();
    for (;;) { const { done, value } = await r.read(); if (done) break; chunks.push(value); }
    const out = new Uint8Array(chunks.reduce((a, c) => a + c.length, 0));
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    return out;
  }

  async function inflate(bytes) {
    const ds = new DecompressionStream('deflate-raw');
    const w = ds.writable.getWriter();
    w.write(bytes);
    w.close();
    const chunks = [], r = ds.readable.getReader();
    for (;;) { const { done, value } = await r.read(); if (done) break; chunks.push(value); }
    const out = new Uint8Array(chunks.reduce((a, c) => a + c.length, 0));
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    return out;
  }

  function slugify(s) {
    return s.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }
  function titleSlug() {
    return drawingTitle ? slugify(drawingTitle) + '~' + btoa(unescape(encodeURIComponent(drawingTitle))) + '~' : '';
  }

  async function updateUrl() {
    const gen = ++urlGen;
    if (strokes.length === 0) { history.replaceState(null, '', location.pathname); return; }
    const hash = toBase64url(await deflate(encodeStrokes(strokes)));
    if (gen !== urlGen) return;
    history.replaceState(null, '', '#' + titleSlug() + hash);
    debouncedSaveToGallery();
  }

  async function loadFromUrl() {
    const h = location.hash.slice(1);
    if (!h) return;
    try {
      let data = h;
      const ti = h.indexOf('~');
      if (ti !== -1) {
        const rest = h.slice(ti + 1);
        const ti2 = rest.indexOf('~');
        if (ti2 !== -1) {
          try { drawingTitle = decodeURIComponent(escape(atob(rest.slice(0, ti2)))); } catch { drawingTitle = h.slice(0, ti).replace(/-/g, ' '); }
          data = rest.slice(ti2 + 1);
        } else {
          drawingTitle = h.slice(0, ti).replace(/-/g, ' ');
          data = rest;
        }
      } else {
        drawingTitle = '';
      }
      if (data) strokes = decodeStrokes(await inflate(fromBase64url(data)));
      updateUndo();
      redraw();
    } catch (e) {
      console.warn('Failed to load drawing from URL:', e);
    }
  }

  function snapAngle(x0, y0, x1, y1) {
    const dx = x1 - x0, dy = y1 - y0;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.round(Math.atan2(dy, dx) / (Math.PI / 18)) * (Math.PI / 18);
    return { x: x0 + dist * Math.cos(angle), y: y0 + dist * Math.sin(angle) };
  }

  // ── Canvas setup ──

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    redraw();
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Mode switching ──

  const modeToggle = document.getElementById('mode-toggle');

  function setMode(m) {
    if (mode === m) return;
    if (mode === 'text') { commitText(); stopBlink(); }
    if (mode === 'draw' && drawing) endStroke({ pointerId: activePointer });
    mode = m;
    document.body.classList.toggle('text-mode', m === 'text');
    modeToggle.title = m === 'text' ? 'Text mode (Esc to exit)' : 'Draw mode (i for text)';
    if (m === 'text') startBlink();
    redraw();
  }

  modeToggle.addEventListener('click', () => setMode(mode === 'draw' ? 'text' : 'draw'));

  // ── Blink cursor ──

  function startBlink() {
    cursorBlink = true;
    blinkInterval = setInterval(() => { cursorBlink = !cursorBlink; redraw(); }, 530);
  }

  function stopBlink() {
    clearInterval(blinkInterval);
    blinkInterval = null;
    cursorBlink = false;
  }

  function resetBlink() {
    cursorBlink = true;
    clearInterval(blinkInterval);
    blinkInterval = setInterval(() => { cursorBlink = !cursorBlink; redraw(); }, 530);
    redraw();
  }

  // ── Pointer events ──

  canvas.addEventListener('pointerenter', () => { mouseOnCanvas = true; });
  canvas.addEventListener('pointerleave', () => { mouseOnCanvas = false; redraw(); });

  canvas.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    if (mode === 'text') {
      commitText();
      mouseX = e.clientX;
      mouseY = e.clientY;
      redraw();
      return;
    }
    if (drawing) return;
    activePointer = e.pointerId;
    drawing = true;
    canvas.setPointerCapture(e.pointerId);
    current = { type: 'stroke', points: [{ x: e.clientX, y: e.clientY }], color, width: brushWidth };
  });

  canvas.addEventListener('pointermove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    if (mode === 'text') {
      if (activeText) {
        const dx = mouseX - activeText.x, dy = mouseY - activeText.y;
        if (dx * dx + dy * dy > 2500) commitText();
      }
      redraw();
      return;
    }

    if (!drawing || e.pointerId !== activePointer) return;
    current.points.push({ x: e.clientX, y: e.clientY });
    redraw();
  });

  function endStroke(e) {
    if (!drawing || e.pointerId !== activePointer) return;
    drawing = false;
    activePointer = null;
    if (current) {
      if (shiftHeld && current.points.length >= 2) {
        const start = current.points[0];
        const last = current.points[current.points.length - 1];
        current.points = [start, snapAngle(start.x, start.y, last.x, last.y)];
      }
      strokes.push(current);
      current = null;
      updateUndo();
      redraw();
      updateUrl();
    }
  }

  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);

  // ── Rendering ──

  function renderStroke(s) {
    const pts = s.points;
    ctx.beginPath();
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (pts.length === 1) {
      ctx.fillStyle = s.color;
      ctx.arc(pts[0].x, pts[0].y, s.width / 2, 0, Math.PI * 2);
      ctx.fill();
      return;
    }

    ctx.moveTo(pts[0].x, pts[0].y);
    if (pts.length === 2) {
      ctx.lineTo(pts[1].x, pts[1].y);
    } else {
      for (let i = 1; i < pts.length - 1; i++) {
        const mx = (pts[i].x + pts[i + 1].x) / 2;
        const my = (pts[i].y + pts[i + 1].y) / 2;
        ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
      }
      ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
    }
    ctx.stroke();
  }

  function renderTextEntry(t) {
    const lines = t.text.split('\n');
    const lh = t.fontSize * 1.3;
    ctx.font = `${t.fontSize}px ${t.fontFamily}`;
    ctx.fillStyle = t.color;
    ctx.textBaseline = 'middle';
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], t.x, t.y + i * lh);
    }
  }

  function renderEntry(entry) {
    if (entry.type === 'text') renderTextEntry(entry);
    else renderStroke(entry);
  }

  function cursorToLineCol(text, pos) {
    const lines = text.substring(0, pos).split('\n');
    return { line: lines.length - 1, col: lines[lines.length - 1].length };
  }

  function renderCursor() {
    if (!cursorBlink || mode !== 'text') return;
    let cx, cy, h;
    if (activeText) {
      const lh = activeText.fontSize * 1.3;
      const lines = activeText.text.split('\n');
      const { line, col } = cursorToLineCol(activeText.text, activeText.cursorPos);
      ctx.font = `${activeText.fontSize}px ${activeText.fontFamily}`;
      cx = activeText.x + ctx.measureText(lines[line].substring(0, col)).width;
      cy = activeText.y + line * lh;
      h = activeText.fontSize;
    } else {
      if (!mouseOnCanvas) return;
      cx = mouseX;
      cy = mouseY;
      h = fontSize;
    }
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.moveTo(cx, cy - h * 0.5);
    ctx.lineTo(cx, cy + h * 0.5);
    ctx.stroke();
  }

  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    strokes.forEach(renderEntry);
    if (activeText && activeText.text.length > 0) renderTextEntry(activeText);
    if (current) {
      if (shiftHeld && current.points.length >= 2) {
        const s = current, p0 = s.points[0], pN = s.points[s.points.length - 1];
        const snapped = snapAngle(p0.x, p0.y, pN.x, pN.y);
        ctx.beginPath();
        ctx.strokeStyle = s.color;
        ctx.lineWidth = s.width;
        ctx.lineCap = 'round';
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(snapped.x, snapped.y);
        ctx.stroke();
        const deg = Math.round(Math.atan2(snapped.y - p0.y, snapped.x - p0.x) * 180 / Math.PI);
        const label = deg + '\u00B0';
        ctx.font = '11px -apple-system, sans-serif';
        const tw = ctx.measureText(label).width;
        const r = Math.max(tw / 2 + 6, 14);
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.beginPath();
        ctx.arc(p0.x, p0.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        ctx.fillText(label, p0.x, p0.y);
        ctx.textAlign = 'start';
      } else {
        renderStroke(current);
      }
    }
    renderCursor();
  }

  // ── Text helpers ──

  function commitText() {
    if (activeText && activeText.text.length > 0) {
      strokes.push({
        type: 'text', x: activeText.x, y: activeText.y,
        text: activeText.text, color: activeText.color,
        fontSize: activeText.fontSize, fontFamily: activeText.fontFamily
      });
      updateUndo();
      updateUrl();
    }
    activeText = null;
  }

  function prevWordBound(text, pos) {
    if (pos <= 0) return 0;
    if (text[pos - 1] === '\n') return pos - 1;
    let i = pos - 1;
    while (i > 0 && text[i - 1] === ' ') i--;
    while (i > 0 && text[i - 1] !== ' ' && text[i - 1] !== '\n') i--;
    return i;
  }

  function nextWordBound(text, pos) {
    const len = text.length;
    if (pos >= len) return len;
    if (text[pos] === '\n') return pos + 1;
    let i = pos;
    while (i < len && text[i] !== ' ' && text[i] !== '\n') i++;
    while (i < len && text[i] === ' ') i++;
    return i;
  }

  // ── Keyboard ──

  document.addEventListener('keydown', e => {
    if (e.key === 'Shift') { shiftHeld = true; if (drawing) redraw(); }
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'Shift') { shiftHeld = false; if (drawing) redraw(); }
  });

  const colorBtns = document.querySelectorAll('.color-btn');

  function cycleColor(reverse) {
    const cur = document.querySelector('.color-btn.active');
    const arr = [...colorBtns];
    const i = arr.indexOf(cur);
    const next = arr[(i + (reverse ? arr.length - 1 : 1)) % arr.length];
    cur.classList.remove('active');
    next.classList.add('active');
    color = next.dataset.color;
    if (activeText) { activeText.color = color; redraw(); }
  }

  const helpOverlay = document.getElementById('help-overlay');
  const helpBtn = document.getElementById('help-btn');
  helpOverlay.addEventListener('click', () => helpOverlay.classList.remove('visible'));
  helpBtn.addEventListener('click', () => helpOverlay.classList.toggle('visible'));

  document.addEventListener('keydown', e => {
    if (e.key === '?' && !activeText) {
      helpOverlay.classList.toggle('visible');
      return;
    }
    if (helpOverlay.classList.contains('visible')) {
      if (e.key === 'Escape' || e.key === '?') helpOverlay.classList.remove('visible');
      return;
    }

    if (e.key === 'Tab') {
      e.preventDefault();
      cycleColor(e.shiftKey);
      return;
    }

    if (e.key === 'z' && (e.metaKey || e.ctrlKey) && !e.shiftKey) {
      e.preventDefault();
      undo();
      return;
    }

    if (mode === 'draw') {
      if (e.key === 'i' && !e.metaKey && !e.ctrlKey && !e.altKey) {
        e.preventDefault();
        setMode('text');
      }
      return;
    }

    // ── Text mode ──

    if (e.key === 'Escape') { commitText(); setMode('draw'); return; }
    if (e.metaKey || e.ctrlKey) return;

    if (e.key === 'Enter') {
      e.preventDefault();
      if (!activeText) {
        activeText = {
          type: 'text', x: mouseX, y: mouseY, text: '',
          color, fontSize, fontFamily, cursorPos: 0
        };
      }
      activeText.text = activeText.text.slice(0, activeText.cursorPos) + '\n' + activeText.text.slice(activeText.cursorPos);
      activeText.cursorPos++;
      resetBlink();
      return;
    }

    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (activeText) {
        activeText.cursorPos = e.altKey
          ? prevWordBound(activeText.text, activeText.cursorPos)
          : Math.max(0, activeText.cursorPos - 1);
        resetBlink();
      }
      return;
    }

    if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (activeText) {
        activeText.cursorPos = e.altKey
          ? nextWordBound(activeText.text, activeText.cursorPos)
          : Math.min(activeText.text.length, activeText.cursorPos + 1);
        resetBlink();
      }
      return;
    }

    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      if (activeText) {
        const lines = activeText.text.split('\n');
        const { line, col } = cursorToLineCol(activeText.text, activeText.cursorPos);
        const target = e.key === 'ArrowUp' ? line - 1 : line + 1;
        if (target >= 0 && target < lines.length) {
          const tCol = Math.min(col, lines[target].length);
          let pos = 0;
          for (let i = 0; i < target; i++) pos += lines[i].length + 1;
          activeText.cursorPos = pos + tCol;
          resetBlink();
        }
      }
      return;
    }

    if (e.key === 'Backspace') {
      e.preventDefault();
      if (activeText && activeText.cursorPos > 0) {
        const to = e.altKey ? prevWordBound(activeText.text, activeText.cursorPos) : activeText.cursorPos - 1;
        activeText.text = activeText.text.slice(0, to) + activeText.text.slice(activeText.cursorPos);
        activeText.cursorPos = to;
        resetBlink();
      }
      return;
    }

    if (e.key === 'Delete') {
      e.preventDefault();
      if (activeText && activeText.cursorPos < activeText.text.length) {
        const to = e.altKey ? nextWordBound(activeText.text, activeText.cursorPos) : activeText.cursorPos + 1;
        activeText.text = activeText.text.slice(0, activeText.cursorPos) + activeText.text.slice(to);
        resetBlink();
      }
      return;
    }

    if (e.key.length === 1) {
      e.preventDefault();
      if (!activeText) {
        activeText = {
          type: 'text', x: mouseX, y: mouseY, text: '',
          color, fontSize, fontFamily, cursorPos: 0
        };
      }
      activeText.text = activeText.text.slice(0, activeText.cursorPos) + e.key + activeText.text.slice(activeText.cursorPos);
      activeText.cursorPos++;
      resetBlink();
    }
  });

  // ── Sidebar: colors ──

  colorBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.color-btn.active').classList.remove('active');
      btn.classList.add('active');
      color = btn.dataset.color;
    });
  });

  // ── Sidebar: thickness ──

  document.querySelector('.thickness-slider').addEventListener('input', e => {
    brushWidth = parseInt(e.target.value);
  });

  // ── Sidebar: text size ──

  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.size-btn.active').classList.remove('active');
      btn.classList.add('active');
      fontSize = parseInt(btn.dataset.size);
    });
  });

  // ── Sidebar: text font ──

  document.querySelectorAll('.font-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.font-btn.active').classList.remove('active');
      btn.classList.add('active');
      fontFamily = btn.dataset.font;
    });
  });

  // ── Sidebar: undo ──

  const undoBtn = document.getElementById('undo');
  function undo() {
    if (activeText) { activeText = null; redraw(); return; }
    if (strokes.length === 0) return;
    strokes.pop();
    updateUndo();
    redraw();
    updateUrl();
  }
  undoBtn.addEventListener('click', undo);
  function updateUndo() { undoBtn.disabled = strokes.length === 0; }

  // ── Sidebar: clear ──

  document.getElementById('clear').addEventListener('click', () => {
    activeText = null;
    strokes = [];
    updateUndo();
    redraw();
    updateUrl();
  });

  // ── Sidebar: save SVG ──

  const r2 = n => Math.round(n * 100) / 100;

  function strokeToSvg(s) {
    const pts = s.points;
    if (pts.length === 1) {
      return `  <circle cx="${r2(pts[0].x)}" cy="${r2(pts[0].y)}" r="${r2(s.width / 2)}" fill="${s.color}"/>`;
    }
    let d = `M${r2(pts[0].x)} ${r2(pts[0].y)}`;
    if (pts.length === 2) {
      d += ` L${r2(pts[1].x)} ${r2(pts[1].y)}`;
    } else {
      for (let i = 1; i < pts.length - 1; i++) {
        const mx = r2((pts[i].x + pts[i + 1].x) / 2);
        const my = r2((pts[i].y + pts[i + 1].y) / 2);
        d += ` Q${r2(pts[i].x)} ${r2(pts[i].y)} ${mx} ${my}`;
      }
      d += ` L${r2(pts[pts.length - 1].x)} ${r2(pts[pts.length - 1].y)}`;
    }
    return `  <path d="${d}" stroke="${s.color}" stroke-width="${s.width}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  }

  function escXml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function textToSvg(t) {
    const lines = t.text.split('\n');
    const lh = t.fontSize * 1.3;
    const x = r2(t.x);
    const tspans = lines.map((line, i) =>
      `<tspan x="${x}"${i > 0 ? ` dy="${r2(lh)}"` : ''}>${escXml(line)}</tspan>`
    ).join('');
    return `  <text y="${r2(t.y)}" font-family="${t.fontFamily}" font-size="${t.fontSize}" fill="${t.color}" dominant-baseline="central">${tspans}</text>`;
  }

  function entryToSvg(entry) {
    return entry.type === 'text' ? textToSvg(entry) : strokeToSvg(entry);
  }

  document.getElementById('save').addEventListener('click', () => {
    commitText();
    redraw();
    const w = canvas.width, h = canvas.height;
    const els = strokes.map(entryToSvg).join('\n');
    const svg = `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">\n${els}\n</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'drawing.svg';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  });

  // ── Home screen ──

  const homeEl = document.getElementById('home');
  const homeGrid = document.getElementById('home-grid');
  const homeBtn = document.getElementById('home-btn');

  const GALLERY_KEY = 'drawboard_gallery';
  const GALLERY_MAX = 15;
  const THUMB_W = 600;
  const THUMB_H = 400;
  let currentBoardId = null;

  function loadGallery() {
    try { return JSON.parse(localStorage.getItem(GALLERY_KEY) || '[]'); }
    catch { return []; }
  }

  function saveGallery(entries) {
    try { localStorage.setItem(GALLERY_KEY, JSON.stringify(entries)); } catch {}
  }

  function upsertGallery(hash, thumb, replaceId, title) {
    let entries = loadGallery();
    if (replaceId) entries = entries.filter(e => e.id !== replaceId);
    entries = entries.filter(e => e.hash !== hash);
    const id = replaceId || Date.now().toString(36);
    entries.unshift({ id, hash, thumb, title: title || '' });
    saveGallery(entries.slice(0, GALLERY_MAX));
    return id;
  }

  let saveTimer = 0;
  let lastSavedHash = '';
  function saveToGallery() {
    if (!homeEl.classList.contains('hidden') || strokes.length === 0) return;
    const h = location.hash.slice(1);
    if (!h || h === lastSavedHash) return;
    redraw();
    const thumb = captureThumbnail();
    if (thumb) {
      const id = upsertGallery(h, thumb, currentBoardId, drawingTitle);
      if (!currentBoardId) currentBoardId = id;
      lastSavedHash = h;
    }
  }
  function debouncedSaveToGallery() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveToGallery, 2000);
  }

  function deleteEntry(id) {
    saveGallery(loadGallery().filter(e => e.id !== id));
    renderHome();
  }

  function captureThumbnail() {
    if (strokes.length === 0) return null;
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const s of strokes) {
      if (s.type === 'stroke') {
        for (const p of s.points) {
          x0 = Math.min(x0, p.x - s.width);
          y0 = Math.min(y0, p.y - s.width);
          x1 = Math.max(x1, p.x + s.width);
          y1 = Math.max(y1, p.y + s.width);
        }
      } else {
        ctx.font = `${s.fontSize}px ${s.fontFamily}`;
        const lines = s.text.split('\n');
        const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
        x0 = Math.min(x0, s.x);
        y0 = Math.min(y0, s.y - s.fontSize * 0.65);
        x1 = Math.max(x1, s.x + maxW);
        y1 = Math.max(y1, s.y + (lines.length - 1) * s.fontSize * 1.3 + s.fontSize * 0.65);
      }
    }
    const pad = 20;
    x0 = Math.max(0, x0 - pad); y0 = Math.max(0, y0 - pad);
    x1 += pad; y1 += pad;
    const bw = (x1 - x0) || 1, bh = (y1 - y0) || 1;
    const dpr = window.devicePixelRatio || 1;
    const oc = document.createElement('canvas');
    oc.width = THUMB_W; oc.height = THUMB_H;
    const ox = oc.getContext('2d');
    ox.fillStyle = '#faf5ec';
    ox.fillRect(0, 0, THUMB_W, THUMB_H);
    const scale = Math.min(THUMB_W / bw, THUMB_H / bh);
    const dw = bw * scale, dh = bh * scale;
    const dx = (THUMB_W - dw) / 2, dy = (THUMB_H - dh) / 2;
    ox.drawImage(canvas, x0 * dpr, y0 * dpr, bw * dpr, bh * dpr, dx, dy, dw, dh);
    return oc.toDataURL('image/jpeg', 0.7);
  }

  function renderHome() {
    homeGrid.innerHTML = '';
    const nc = document.createElement('div');
    nc.className = 'home-cell new-cell';
    nc.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    nc.addEventListener('click', () => showBoard(null));
    homeGrid.appendChild(nc);
    for (const entry of loadGallery()) {
      const cell = document.createElement('div');
      cell.className = 'home-cell';
      const img = document.createElement('img');
      img.src = entry.thumb;
      img.draggable = false;
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '\u00d7';
      del.addEventListener('click', e => { e.stopPropagation(); deleteEntry(entry.id); });
      cell.appendChild(img);
      if (entry.title) {
        const t = document.createElement('span');
        t.className = 'home-title';
        t.textContent = entry.title;
        cell.appendChild(t);
      }
      cell.appendChild(del);
      cell.addEventListener('click', () => { currentBoardId = entry.id; showBoard(entry.hash); });
      homeGrid.appendChild(cell);
    }
  }

  async function showHome() {
    commitText();
    stopBlink();
    if (strokes.length > 0) {
      // updateUrl is async/debounced so we eagerly compress here to guarantee hash is current before saveToGallery reads it
      const hash = toBase64url(await deflate(encodeStrokes(strokes)));
      history.replaceState(null, '', '#' + titleSlug() + hash);
    }
    clearTimeout(saveTimer);
    saveToGallery();
    lastSavedHash = '';
    currentBoardId = null;
    urlGen++;
    strokes = [];
    current = null;
    activeText = null;
    drawing = false;
    activePointer = null;
    drawingTitle = '';
    titleInput.value = '';
    updateUndo();
    redraw();
    history.replaceState(null, '', location.pathname);
    homeEl.classList.remove('hidden');
    homeBtn.classList.add('hidden');
    titleInput.classList.add('hidden');
    renderHome();
  }

  async function showBoard(hash) {
    homeEl.classList.add('hidden');
    homeBtn.classList.remove('hidden');
    titleInput.classList.remove('hidden');
    strokes = [];
    current = null;
    activeText = null;
    drawing = false;
    activePointer = null;
    drawingTitle = '';
    if (hash) {
      history.replaceState(null, '', '#' + hash);
      await loadFromUrl();
    }
    titleInput.value = drawingTitle;
    titleInput.style.color = drawingTitle ? '#3a3a3a' : '';
    autoSizeTitle();
    updateUndo();
    redraw();
  }

  homeBtn.addEventListener('click', showHome);

  const titleInput = document.getElementById('title-input');
  titleInput.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Escape' || e.key === 'Enter') titleInput.blur();
  });
  titleInput.addEventListener('focus', () => { titleInput.placeholder = ''; autoSizeTitle(); });
  titleInput.addEventListener('blur', () => { titleInput.placeholder = 'Untitled'; autoSizeTitle(); });
  function autoSizeTitle() {
    titleInput.size = Math.max(1, titleInput.value.length || titleInput.placeholder.length);
  }
  titleInput.addEventListener('input', () => {
    drawingTitle = titleInput.value;
    titleInput.style.color = drawingTitle ? '#3a3a3a' : '';
    autoSizeTitle();
    updateUrl();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') saveToGallery();
  });
  window.addEventListener('beforeunload', saveToGallery);

  // ── Init ──
  if (location.hash.slice(1)) {
    showBoard(location.hash.slice(1));
  } else {
    renderHome();
  }
</script>

</body>
</html>
